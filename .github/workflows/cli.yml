name: CLI

on:
  pull_request:
    paths:
      - "apps/cli/**"
      - "packages/**"
      - "docker-compose.yml"
      - ".github/workflows/cli.yml"

permissions:
  contents: read

jobs:
  verify:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --filter @promptyard/cli lint

      - name: Test
        run: bun run --filter @promptyard/cli test
