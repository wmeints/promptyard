name: Code Review
on:
  pull_request:
    types:
      [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review, review_requested, review_request_removed]
jobs:
  enforce-tier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      final_tier: ${{ steps.compute.outputs.final_tier }}
      review_label: ${{ steps.compute.outputs.review_label }}
      human_review_required: ${{ steps.compute.outputs.human_review_required }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Prepare trusted tier gate scripts
        id: trusted
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          TOOLS_DIR="$RUNNER_TEMP/tier-gate"
          SCRIPTS_DIR="$TOOLS_DIR/scripts"
          mkdir -p "$SCRIPTS_DIR"

          git show "origin/$BASE_REF:scripts/compute-tier.ts" > "$SCRIPTS_DIR/compute-tier.ts"
          git show "origin/$BASE_REF:scripts/compute-final-tier.ts" > "$SCRIPTS_DIR/compute-final-tier.ts"
          git show "origin/$BASE_REF:package.json" > "$TOOLS_DIR/package.json"
          git show "origin/$BASE_REF:bun.lock" > "$TOOLS_DIR/bun.lock"

          echo "tools_dir=$TOOLS_DIR" >> "$GITHUB_OUTPUT"

      - name: Install trusted tier gate dependencies
        shell: bash
        working-directory: ${{ steps.trusted.outputs.tools_dir }}
        run: bun install --frozen-lockfile

      - name: Read LLM escalation marker from PR body
        id: marker
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          LLM_ESCALATION="$(printf '%s' "${PR_BODY:-}" | tr -d '\r' | sed -nE 's/.*<!--[[:space:]]*llm_escalation:[[:space:]]*(NONE|T1|T2|T3)[[:space:]]*-->.*/\1/p' | head -n1)"
          if [ -z "$LLM_ESCALATION" ]; then
            echo "Missing required marker: <!-- llm_escalation: NONE|T1|T2|T3 -->"
            exit 1
          fi
          echo "llm_escalation=$LLM_ESCALATION" >> "$GITHUB_OUTPUT"

      - name: Compute deterministic final tier
        id: compute
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          TOOLS_DIR: ${{ steps.trusted.outputs.tools_dir }}
        run: |
          RESULT="$(bun run "$TOOLS_DIR/scripts/compute-final-tier.ts" --base "$BASE_REF" "${{ steps.marker.outputs.llm_escalation }}")"
          printf '%s\n' "$RESULT" > tier-result.json

          FINAL_TIER="$(jq -r '.final_tier' tier-result.json)"
          REVIEW_LABEL="$(jq -r '.review_label' tier-result.json)"
          HUMAN_REQUIRED="$(jq -r '.human_review_required' tier-result.json)"

          if [ "$FINAL_TIER" = "null" ] || [ "$REVIEW_LABEL" = "null" ] || [ "$HUMAN_REQUIRED" = "null" ]; then
            echo "Invalid compute-final-tier output"
            exit 1
          fi

          echo "final_tier=$FINAL_TIER" >> "$GITHUB_OUTPUT"
          echo "review_label=$REVIEW_LABEL" >> "$GITHUB_OUTPUT"
          echo "human_review_required=$HUMAN_REQUIRED" >> "$GITHUB_OUTPUT"

      - name: Ensure review tier labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ["review:T1", "review:T2", "review:T3"];
            for (const name of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: "0052cc",
                  description: "Deterministic review tier label",
                });
              }
            }

      - name: Sync deterministic review label
        uses: actions/github-script@v7
        env:
          EXPECTED_LABEL: ${{ steps.compute.outputs.review_label }}
        with:
          script: |
            const expected = process.env.EXPECTED_LABEL;
            const issue_number = context.payload.pull_request.number;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const current = issue.labels.map((label) => typeof label === "string" ? label : label.name);
            const filtered = current.filter((name) => !/^review:T[123]$/.test(name));
            const nextLabels = [...filtered, expected];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: nextLabels,
            });

      - name: Enforce human reviewer requirement
        shell: bash
        env:
          HUMAN_REQUIRED: ${{ steps.compute.outputs.human_review_required }}
          REQUESTED_REVIEWERS: ${{ toJson(github.event.pull_request.requested_reviewers) }}
          REQUESTED_TEAMS: ${{ toJson(github.event.pull_request.requested_teams) }}
        run: |
          if [ "$HUMAN_REQUIRED" != "true" ]; then
            exit 0
          fi

          REVIEWER_COUNT="$(echo "$REQUESTED_REVIEWERS" | jq 'length')"
          TEAM_COUNT="$(echo "$REQUESTED_TEAMS" | jq 'length')"

          if [ "$REVIEWER_COUNT" -eq 0 ] && [ "$TEAM_COUNT" -eq 0 ]; then
            echo "human_review_required=true but no requested reviewers or teams are set"
            exit 1
          fi

  review:
    needs: enforce-tier
    if: >-
      needs.enforce-tier.outputs.final_tier == 'T1' ||
      needs.enforce-tier.outputs.final_tier == 'T2'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run code review against the current branch
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPOSITORY: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}

            Please review the pull request with a focus on:

            - Code quality and best practices
            - Logic errors in the change
            - Security implications
            - Performance considerations

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback. Use `.github/review-template.md` as a template for the top-level comments.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages. Make sure there isn't already a comment about the same finding.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
