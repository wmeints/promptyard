name: Code Review
on:
  pull_request:
    types: [opened]
jobs:
  review:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'review:T1') ||
      contains(github.event.pull_request.labels.*.name, 'review:T2')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run code review against the current branch
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPOSITORY: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number }}

            Please review the pull request with a focus on:

            - Code quality and best practices
            - Logic errors in the change
            - Security implications
            - Performance considerations

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback. Use `.github/review-template.md` as a template for the top-level comments.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages. Make sure there isn't already a comment about the same finding.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
