name: Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
jobs:
  review:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'review:T1') ||
      contains(github.event.pull_request.labels.*.name, 'review:T2')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/code-review high"
